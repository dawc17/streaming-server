services:
  srs:
    image: ossrs/srs:5
    restart: unless-stopped
    ports:
      - "1935:1935" # RTMP ingest — point OBS here
      - "1985:1985" # HTTP API + WHEP endpoint
      - "8080:8080" # HTTP server — serves the frontend
      - "8000:8000/udp" # WebRTC media (UDP)
    volumes:
      - ./srs.conf:/usr/local/srs/conf/srs.conf
      # Serve the frontend from SRS's built-in HTTP server
      - .:/usr/local/srs/objs/nginx/html/stream
    environment:
      - CANDIDATE=127.0.0.1
