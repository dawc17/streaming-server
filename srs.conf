listen              1935;
max_connections     1000;
daemon              off;
srs_log_tank        console;

http_api {
    enabled         on;
    listen          1985;
    crossdomain     on;
}

http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx/html;
}

rtc_server {
    enabled         on;
    listen          8000;
    candidate       $CANDIDATE;
    merge_nalus     off;
}

vhost __defaultVhost__ {
    rtc {
        enabled         on;
        rtmp_to_rtc     on;
        rtc_to_rtmp     off;
        nack            on;
        twcc            on;
    }

    http_remux {
        enabled     on;
        mount       [vhost]/[app]/[stream].flv;
    }

    dvr {
        enabled      on;
        dvr_path     ./objs/nginx/html/vods/[app]/[stream]/[2006]-[01]-[02]_[15]-[04]-[05].flv;
        dvr_plan     session;
    }
}
