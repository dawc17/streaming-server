services:
  srs:
    image: ossrs/srs:5
    restart: unless-stopped
    ports:
      - "1935:1935" # RTMP ingest — point OBS here
      - "1985:1985" # HTTP API + WHEP endpoint
      - "8000:8000/udp" # WebRTC media (UDP)
      # 8080 is intentionally NOT exposed here — nginx takes over below
    command: ./objs/srs -c conf/srs.conf
    volumes:
      - ./srs.conf:/usr/local/srs/conf/srs.conf
      - .:/usr/local/srs/objs/nginx/html/stream
      - vods:/usr/local/srs/objs/nginx/html/vods # VOD recordings storage
    environment:
      - CANDIDATE=10.136.64.45

  # ── nginx: serves the frontend + proxies /api/ to sandbox ────
  # Keeps everything on one already-open port (8080) so no extra
  # Windows Firewall rules are needed for external viewers.
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:8080" # frontend + API proxy (single public port)
    volumes:
      - ./nginx-frontend.conf:/etc/nginx/conf.d/default.conf:ro
      - .:/var/www/html:ro
      - vods:/var/www/vods:ro # Serve VOD recordings
    depends_on:
      - sandbox

  # ── Interactive sandbox: Ubuntu + tmux + command API ─────────
  sandbox:
    build: ./backend
    restart: unless-stopped
    stdin_open: true # keep STDIN open (for tmux attach via docker exec)
    tty: true # allocate a pseudo-TTY
    # Port 3000 is NOT exposed to the host — nginx proxies to it internally.
    # To test directly from localhost: docker exec or add 3000:3000 temporarily.
    expose:
      - "3000"
    volumes:
      - vods:/vods:ro # Read VOD metadata (read-only for safety)
    # Limit resources so viewers can't abuse the box
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

volumes:
  vods: # Persistent storage for VOD recordings
