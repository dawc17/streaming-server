# ─────────────────────────────────────────────────────────────────────────────
# nginx-rtmp low-latency + CORS config
#
# Two sections to merge into your nginx.conf:
#   1. rtmp {} block  – controls how HLS fragments are written
#   2. http {} block  – serves them with CORS headers
# ─────────────────────────────────────────────────────────────────────────────

# ── 1. RTMP ingest ───────────────────────────────────────────────────────────
rtmp {
    server {
        listen 1935;
        chunk_size 4096;

        application live {
            live on;
            record off;

            hls on;
            hls_path /tmp/hls;         # ← must match root in the http block below

            # ── Latency knobs ──────────────────────────────────────────────
            # Fragment length: 1 s gives ~2-4 s glass-to-glass latency.
            # Going below 1 s risks stalling on slower connections.
            hls_fragment     1s;

            # Playlist holds this many fragments.
            # 3 × 1 s = 3 s total playlist window.
            hls_playlist_length 3s;

            # Sync the encoder clock to wall-clock so segments are
            # written as soon as they're ready, not buffered.
            hls_sync 100ms;
        }
    }
}

# ── 2. HTTP serving ──────────────────────────────────────────────────────────
http {
    server {
        listen 8080;

        # ── Serve the frontend ──────────────────────────────────────────────
        location / {
            root   /path/to/streaming-server;  # ← point at your project folder
            index  index.html;
        }

        # ── HLS segments ────────────────────────────────────────────────────
        location /hls {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t                    ts;
            }

            root /tmp;   # ← same parent as hls_path above

            # CORS — required when the page is on a different origin
            add_header 'Access-Control-Allow-Origin'  '*'            always;
            add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Range'        always;

            # Never cache playlists — clients must always fetch the freshest one
            add_header 'Cache-Control' 'no-cache, no-store' always;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Max-Age'      1728000;
                add_header 'Content-Type'                'text/plain charset=UTF-8';
                add_header 'Content-Length'              0;
                return 204;
            }
        }
    }
}
