server {
    listen 8080;
    root  /var/www/html;
    index index.html;

    # ── Command API → sandbox container ──────────────────────────
    # Proxied through the same port as the frontend so no extra
    # firewall rules are needed on the host machine.
    location /api/ {
        proxy_pass          http://sandbox:3000;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ── VOD recordings ─────────────────────────────────────────────
    # Serve recorded FLV files for on-demand playback.
    location /vods/ {
        alias /var/www/vods/;
        # Enable seeking and partial content for video streaming
        add_header Accept-Ranges bytes;
        add_header Cache-Control "public, max-age=3600";
        # Allow CORS for video element
        add_header Access-Control-Allow-Origin *;
        # Prevent directory listing
        autoindex off;
    }
    # ── HTTP-FLV stream → SRS http_server ─────────────────────────────
    # proxy_buffering off is critical: FLV is an infinite chunked response.
    location /live/ {
        proxy_pass              http://srs:8080;
        proxy_http_version      1.1;
        proxy_buffering         off;
        proxy_cache             off;
        proxy_read_timeout      3600s;
        proxy_send_timeout      3600s;
        proxy_set_header        Host            $host;
        proxy_set_header        X-Real-IP       $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── SRS WHEP / WebRTC signalling → SRS HTTP API ────────────────
    # Routes /rtc/ and /api/v1/ through port 8080 so the whole
    # app (including WHEP signalling) works behind a single ngrok
    # tunnel.  WebRTC *media* (UDP 8000) still needs a direct LAN
    # connection — ngrok cannot tunnel UDP.
    location /rtc/ {
        proxy_pass          http://srs:1985;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
    }
    location /api/v1/ {
        proxy_pass          http://srs:1985;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
    }
    # ── Static frontend — old SRS path /stream/ ──────────────────
    # SRS served the app at /stream/ (volume was mounted there).
    # nginx serves from root, so we alias /stream/ back to the
    # same directory so existing bookmarks/links keep working.
    location /stream/ {
        alias  /var/www/html/;
        index  index.html;
        try_files $uri $uri/ /stream/index.html;
    }

    # ── Static frontend — root path ───────────────────────────────
    location / {
        try_files $uri $uri/ =404;
    }
}
