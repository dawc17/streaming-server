# ─────────────────────────────────────────────────────────────────────────────
# SRS (Simple Realtime Server) configuration
# Accepts RTMP from OBS and outputs WebRTC via WHEP.
# ─────────────────────────────────────────────────────────────────────────────

listen              1935;
max_connections     1000;
daemon              off;
srs_log_tank        console;

# ── HTTP API (exposes the WHEP endpoint) ─────────────────────────────────────
http_api {
    enabled         on;
    listen          1985;
    crossdomain     on;   # allows browser WHEP requests from any origin
}

# ── Optional HTTP server (serves static files / HLS if needed) ───────────────
http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx/html;
}

# ── WebRTC UDP server ─────────────────────────────────────────────────────────
rtc_server {
    enabled         on;
    listen          8000;
    # CANDIDATE is the IP the browser must reach to send/receive UDP media.
    candidate       ${CANDIDATE};
    # Send each NAL unit as a separate RTP packet immediately.
    # Costs slightly more bandwidth but reduces framing delay.
    merge_nalus     off;
}

# ── Virtual host (default) ───────────────────────────────────────────────────
vhost __defaultVhost__ {
    rtc {
        enabled         on;
        # Bridge RTMP ingest → WebRTC output
        rtmp_to_rtc     on;
        rtc_to_rtmp     off;
        # NACK-based retransmission: recover lost packets without FEC overhead
        nack            on;
        # Transport-wide congestion control: lets SRS adapt bitrate quickly
        twcc            on;
    }

    # HTTP-FLV output (˜1-2 s latency, pure HTTP — works through ngrok)
    http_remux {
        enabled     on;
        mount       [vhost]/[app]/[stream].flv;
    }
}
